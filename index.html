<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dr. Noura ❤️</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
  overflow:hidden;
}

#intro{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:black;
}

#main{
  display:none;
  padding-top:50px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:white;
  color:black;
  cursor:pointer;
  margin-top:20px;
}

.heart{
  position:fixed;
  bottom:-10px;
  font-size:20px;
  animation:float 5s linear infinite;
}

@keyframes float{
  to{
    transform:translateY(-100vh);
    opacity:0;
  }
}
</style>

</head>

<body>

<!-- Intro -->
<div id="intro">
  <h1 id="typing"></h1>
  <button onclick="start()">Enter ❤️</button>
</div>

<!-- Main -->
<div id="main">
  <h2 id="counter"></h2>
  <button onclick="secret()">Secret ❤️</button>
</div>

<audio id="music" src="song.mp3"></audio>

<script>

// typing
let text="For Dr. Noura Al-Saif ❤️";
let i=0;
function typeWriter(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(typeWriter,80);
  }
}
typeWriter();

// start
function start(){
  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="block";
  document.body.style.overflow="auto";
  document.getElementById("music").play();
}

// counter
let startDate=new Date("2023-12-21");
setInterval(()=>{
  let now=new Date();
  let days=Math.floor((now-startDate)/(1000*60*60*24));
  document.getElementById("counter").innerText=
  days+" days with you ❤️";
},1000);

// hearts
setInterval(()=>{
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),5000);
},300);

// secret message
function secret(){
  let pass=prompt("Enter your birthday ❤️");

  if(pass==="1111"){
    alert(`From the first moment… 21/12/2023 ❤️

Everything changed.

You became my calm, my happiness, and the best thing in my life.

And today… I’m not just in love with you,
I’m proud of the doctor you became 👩‍⚕️✨`);
  }else{
    alert("Try again 😏");
  }
}

</script>

</body>
</html>
