<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dr. Noura ❤️</title>
</head>

<body style="background:black; color:white; text-align:center; font-family:sans-serif;">

<h1 id="typing"></h1>
<h2 id="counter"></h2>

<button onclick="secret()">Secret ❤️</button>

<script>

// typing
let text = "For Dr. Noura Al-Saif ❤️";
let i = 0;
function typeWriter(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter,80);
  }
}
typeWriter();

// counter
let startDate = new Date("2023-12-21");
setInterval(()=>{
  let now = new Date();
  let days = Math.floor((now - startDate)/(1000*60*60*24));
  document.getElementById("counter").innerText =
  days + " days with you ❤️";
},1000);

// secret
function secret(){
  let pass = prompt("Enter your birthday ❤️");
  if(pass === "1111"){
    alert("You are my pride ❤️");
  } else {
    alert("Try again 😏");
  }
}

</script>

</body>
</html>
